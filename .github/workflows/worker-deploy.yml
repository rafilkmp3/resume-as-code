---
name: 🤖 AI Worker (resume-ai)

on:
  push:
    branches: [main]
    # The worker now serves the whole site (static assets) + the API, so a
    # deploy must fire on ANY site or worker change, not just worker files.
    paths:
      - 'infrastructure/workers/resume-ai/**'
      - 'app/**'
      - 'astro.config.mjs'
      - 'tailwind.config.mjs'
      - 'package.json'
      - '.github/workflows/worker-deploy.yml'
  pull_request:
    paths:
      - 'infrastructure/workers/resume-ai/**'
      - 'app/**'
      - 'astro.config.mjs'
      - 'tailwind.config.mjs'
      - 'package.json'
      - '.github/workflows/worker-deploy.yml'
  workflow_dispatch:

concurrency:
  group: worker-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  WRANGLER_VERSION: '4.112.0'
  WRANGLER_CONFIG: 'infrastructure/workers/resume-ai/wrangler.toml'

jobs:
  test:
    name: 🧪 Worker Tests + Bundle Check
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment
        with:
          cache-suffix: 'worker'

      - name: Unit tests (node --test, no Worker runtime)
        run: node --test "infrastructure/workers/resume-ai/test/*.test.mjs"

      - name: Build site (static-assets bundle the dry-run needs)
        run: DEPLOY_URL=https://resume.rafaracing.com.br npm run build

      - name: Bundle check (wrangler deploy --dry-run, no auth needed)
        run: |
          npx --yes wrangler@${{ env.WRANGLER_VERSION }} deploy \
            --dry-run --outdir /tmp/worker-bundle -c "${{ env.WRANGLER_CONFIG }}"

  deploy:
    name: 🚀 Deploy Worker
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check CLOUDFLARE_API_TOKEN secret
        run: |
          if [[ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set."
            echo "Create one at Cloudflare dashboard → My Profile → API Tokens"
            echo "using the 'Edit Cloudflare Workers' template, then run:"
            echo "  gh secret set CLOUDFLARE_API_TOKEN"
            exit 1
          fi

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment
        with:
          cache-suffix: 'worker-site'

      - name: Build site for prod domain (static assets bundle)
        run: DEPLOY_URL=https://resume.rafaracing.com.br npm run build

      - name: Deploy resume-ai (worker + static assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          command: deploy -c ${{ env.WRANGLER_CONFIG }}

      - name: Verify live endpoint (best-effort)
        run: |
          BASE="https://resume.rafaracing.com.br"
          echo "🔍 Verifying $BASE"
          # NOTE: Cloudflare challenges datacenter IPs (bot protection), so the
          # GitHub Actions runner often gets a 403 at the edge even though the
          # Worker is healthy for real browsers. The deploy step above is the
          # real gate — this check only WARNS, never fails the deploy.
          CODE=$(curl -s -m 10 -o /dev/null -w "%{http_code}" -A "resume-ai-ci/1.0" "$BASE/api/health" || true)
          if [[ "$CODE" == "200" ]]; then
            echo "✅ /api/health OK (200)"
          else
            echo "::warning::/api/health returned $CODE from the CI runner — almost certainly a Cloudflare edge/bot challenge on the datacenter IP, not a Worker fault. Deploy already succeeded; verify from a browser if in doubt."
          fi

      - name: Seed curated card answers (KV via API — not IP-challenged)
        # Writes the 4 hero-card answers straight to KV with the API token, so
        # cards are instant + quota-free. Uses the KV API (not the public
        # endpoint), so Cloudflare's edge bot-challenge on the runner doesn't
        # block it — unlike curling /api/chat, which would be 403'd here.
        run: npm run seed:cards
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
