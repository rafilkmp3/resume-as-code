name = "resume-ai"
account_id = "b76ee39565b02457698bb56c4ed12363"
main = "src/index.mjs"
# Highest date the locally-installed wrangler's runtime supports (dev parity).
compatibility_date = "2026-04-01"
workers_dev = false

routes = [
  { pattern = "resume.rafaracing.com.br", custom_domain = true }
]

# Workers AI has NO local simulator — remote = true makes `wrangler dev`
# proxy to the real binding (consumes real free-tier quota, ~10k neurons/day).
[ai]
binding = "AI"
remote = true

[[kv_namespaces]]
binding = "RESUME_AI_KV"
id = "1e15da87e1e94016a078b96292a99731"

[observability]
enabled = true
