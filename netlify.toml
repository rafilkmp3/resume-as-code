# Prod moved to the Cloudflare Worker at resume.rafaracing.com.br (site + AI on
# one domain, Workers Static Assets). Netlify now just 301-redirects there so
# old staging/preview links keep working and hand SEO to the new domain.
[[redirects]]
  from = "/*"
  to = "https://resume.rafaracing.com.br/:splat"
  status = 301
  force = true

[build]
  # Disable Netlify builds - we build in GitHub Actions
  command = "echo 'Build disabled - serving from GitHub Actions artifacts only'"
  publish = "workspace/build"
  ignore = "git diff --quiet HEAD^ HEAD"

# Force cache invalidation
[build.environment]
  NETLIFY_SKIP_FUNCTIONS_CACHE = "true"

# Headers to prevent caching issues
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"